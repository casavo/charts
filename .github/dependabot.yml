version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    allow:
      - dependency-name: "actions/*"
      - dependency-name: "docker/*"
      - dependency-name: "casavo/*"
      - dependency-name: "hashicorp/*"
      - dependency-name: "anthropics/*"
      - dependency-name: "slackapi/*"
      - dependency-name: "abatilo/*"

